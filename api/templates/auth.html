<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kaizō — Connexion</title>
  <link rel="icon" type="image/jpeg" href="/static/img/logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: "Inter", sans-serif; }</style>
</head>
<body>
<div class="min-h-screen bg-neutral-100 flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute top-0 left-0 w-full h-64 bg-neutral-900 rounded-b-[3rem] shadow-xl"></div>

  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative z-10">
    <div class="p-8">
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <div class="flex items-center gap-3">
          <img src="/static/img/logo.jpg" class="w-12 h-12 rounded-xl shadow-sm" alt="kaizō">
          <span class="text-3xl font-bold text-neutral-900">kaizō</span>
        </div>
      </div>
      <div id="authHeading" class="text-center mb-8">
        <h1 id="authTitle" class="text-2xl font-bold text-neutral-900 mb-2">Bon retour !</h1>
        <p id="authSubtitle" class="text-neutral-500 text-sm">Connectez-vous pour accéder à votre tableau de bord.</p>
      </div>

      <!-- Error -->
      <div id="authError" class="hidden mb-4 p-3 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm text-center font-medium"></div>

      <form id="authForm" class="space-y-4" onsubmit="handleAuth(event)">
        <!-- Register-only fields -->
        <div id="registerFields" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-1.5 ml-1">Prénom</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400">
                <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              </div>
              <input type="text" id="firstName" name="firstName" placeholder="Votre prénom"
                class="w-full pl-11 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-all"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-1.5 ml-1">Nom de l'entreprise</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400">
                <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
              </div>
              <input type="text" id="companyName" name="companyName" placeholder="Votre entreprise"
                class="w-full pl-11 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-all"/>
            </div>
          </div>
        </div>

        <!-- WhatsApp -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-1.5 ml-1">Numéro WhatsApp</label>
          <div class="flex gap-2">
            <div class="relative w-1/3">
              <select id="countryCode" name="countryCode"
                class="w-full pl-3 pr-8 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-all appearance-none">
                <option value="+241">🇬🇦 +241</option>
                <option value="+33">🇫🇷 +33</option>
                <option value="+225">🇨🇮 +225</option>
                <option value="+221">🇸🇳 +221</option>
                <option value="+237">🇨🇲 +237</option>
                <option value="+243">🇨🇩 +243</option>
                <option value="+228">🇹🇬 +228</option>
                <option value="+229">🇧🇯 +229</option>
                <option value="+226">🇧🇫 +226</option>
                <option value="+223">🇲🇱 +223</option>
                <option value="+242">🇨🇬 +242</option>
              </select>
            </div>
            <div class="relative flex-1">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400">
                <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <input type="tel" id="whatsapp" name="whatsapp" placeholder="01 23 45 67"
                class="w-full pl-11 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-all"/>
            </div>
          </div>
        </div>

        <!-- Email (register only) -->
        <div id="emailField" class="hidden">
          <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-1.5 ml-1">Email <span class="text-neutral-400 font-normal lowercase">(facultatif)</span></label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400">
              <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <input type="email" id="email" name="email" placeholder="contact@entreprise.com"
              class="w-full pl-11 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-all"/>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-neutral-500 mb-1.5 ml-1">Mot de passe</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-neutral-400">
              <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <input type="password" id="password" name="password" placeholder="••••••••"
              class="w-full pl-11 pr-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-transparent transition-all"/>
          </div>
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-neutral-900 text-white py-4 rounded-xl font-medium text-sm flex items-center justify-center gap-2 hover:bg-neutral-800 transition-colors mt-6 disabled:opacity-60">
          <span id="submitLabel">Se connecter</span>
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        </button>
      </form>
    </div>
    <div class="bg-neutral-50 p-6 text-center border-t border-neutral-100">
      <p class="text-sm text-neutral-600">
        <span id="switchText">Vous n'avez pas de compte ?</span>
        <button onclick="toggleMode()" class="ml-2 font-semibold text-neutral-900 hover:underline" id="switchBtn">S'inscrire</button>
      </p>
    </div>
  </div>
</div>
<script>
  async function apiFetch(url, method="GET", body=null) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
  }

  let isLogin = true;

  function toggleMode() {
    isLogin = !isLogin;
    const regFields = document.getElementById('registerFields');
    const emailField = document.getElementById('emailField');
    const title = document.getElementById('authTitle');
    const subtitle = document.getElementById('authSubtitle');
    const submitLabel = document.getElementById('submitLabel');
    const switchText = document.getElementById('switchText');
    const switchBtn = document.getElementById('switchBtn');
    if (isLogin) {
      regFields.classList.add('hidden');
      emailField.classList.add('hidden');
      title.textContent = 'Bon retour !';
      subtitle.textContent = 'Connectez-vous pour accéder à votre tableau de bord.';
      submitLabel.textContent = 'Se connecter';
      switchText.textContent = "Vous n'avez pas de compte ?";
      switchBtn.textContent = "S'inscrire";
    } else {
      regFields.classList.remove('hidden');
      emailField.classList.remove('hidden');
      title.textContent = 'Bienvenue';
      subtitle.textContent = 'Créez votre compte pour commencer à gérer vos finances.';
      submitLabel.textContent = 'Créer mon compte';
      switchText.textContent = 'Vous avez déjà un compte ?';
      switchBtn.textContent = 'Se connecter';
    }
    document.getElementById('authError').classList.add('hidden');
  }

  async function handleAuth(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('authError');
    btn.disabled = true;
    errEl.classList.add('hidden');
    const countryCode = document.getElementById('countryCode').value;
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const password = document.getElementById('password').value;

    if (!whatsapp || !password) {
      errEl.textContent = 'Veuillez remplir tous les champs obligatoires.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      return;
    }

    let url, body;
    if (isLogin) {
      url = '/api/auth/login';
      body = { countryCode, whatsapp, password };
    } else {
      const firstName = document.getElementById('firstName').value.trim();
      const companyName = document.getElementById('companyName').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!firstName || !companyName) {
        errEl.textContent = 'Veuillez remplir tous les champs obligatoires.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        return;
      }
      url = '/api/auth/register';
      body = { countryCode, whatsapp, firstName, companyName, email, password };
    }

    try {
      const res = await apiFetch(url, 'POST', body);
      if (res.success) {
        window.location.href = '/';
      } else {
        errEl.textContent = res.error || 'Une erreur est survenue.';
        errEl.classList.remove('hidden');
      }
    } catch {
      errEl.textContent = 'Erreur réseau. Vérifiez votre connexion.';
      errEl.classList.remove('hidden');
    }
    btn.disabled = false;
  }

</script>
</body>
</html>
